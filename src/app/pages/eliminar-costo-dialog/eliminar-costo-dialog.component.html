<h2 mat-dialog-title>Confirmar</h2>
    <div mat-dialog-content>¿Está seguro que desea eliminar el costo "{{ data.Descripcion }}"?</div>
    <div mat-dialog-actions>
      <button mat-button (click)="onNoClick()">Cancelar</button>
      <button mat-button color="warn" (click)="onConfirmClick()">Eliminar</button>
    </div>
