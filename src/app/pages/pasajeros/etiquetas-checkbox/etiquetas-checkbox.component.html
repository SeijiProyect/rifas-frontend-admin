<mat-card class="etiquetas-card">
  <mat-card-header>
    <mat-card-title>Etiquetas</mat-card-title>
    <mat-card-subtitle></mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <section>
      <form [formGroup]="form">
        <label formArrayName="orders" *ngFor="let order of ordersFormArray.controls; let i = index">
          <mat-checkbox [formControlName]="i">
            {{etiquetas[i].nombre}}
          </mat-checkbox>
          <br />
        </label>
        <br />
      </form>
    </section>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button mat-raised-button color="accent" (click)="asignar()">ASIGNAR</button>
  </mat-card-actions>
</mat-card>
