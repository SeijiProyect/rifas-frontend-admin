<div class="spinner">
    <mat-spinner ng-animate="'animate'" color="accent" *ngIf="loading"></mat-spinner>
</div>
<div class="general-container">
    <div>
        <div id="main-text">
            <p>
                PERSONAS
            </p>
        </div>
        <div class="table-filters">
            <div class="table-filters-row">
                <div class="table-filters-item-full-width">
                    <mat-form-field class="example-full-width" appearance="fill">
                        <mat-label>Buscar</mat-label>
                        <input matInput placeholder="Nombres, apellidos, e-mail, cédula, persona id..." [(ngModel)]="termino">
                    </mat-form-field>
                </div>
            </div>
            <div class="table-filters-row">
                <div class="table-filters-item table-filters-item-1">
                    <mat-form-field appearance="fill">
                        <mat-label>Sexo</mat-label>
                        <mat-select (selectionChange)="sexoChange($event)" [disabled]="loading">
                            <mat-option value="todos">Todos</mat-option>
                            <mat-option value="F">Mujer</mat-option>
                            <mat-option value="M">Hombre</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="table-filters-item table-filters-item-2 table-filters-item-datepicker">
                    <app-datepicker (dateStart)="desdeValue=$event" (dateEnd)="hastaValue=$event" label="Ingresar fecha nacimiento:"></app-datepicker>
                </div>
                <div class="table-filters-btn table-filters-item-4">
                    <div class="general-btn blue-btn" (click)="filter()">
                        <mat-icon aria-hidden="false" aria-label="Example home icon">filter_list</mat-icon>
                        <div class="btn-text">FILTRAR</div>
                    </div>
                </div>
            </div>
        </div>
        <div id="rifas-box" [class.loading]="loading">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" #tabla1>

                <ng-container matColumnDef="Id">
                    <th mat-header-cell *matHeaderCellDef> Id </th>
                    <td mat-cell *matCellDef="let persona"> {{persona.id}} </td>
                </ng-container>

                <ng-container matColumnDef="Cedula">
                    <th mat-header-cell *matHeaderCellDef> Cedula </th>
                    <td mat-cell *matCellDef="let persona"> {{persona.cedula}} </td>
                </ng-container>

                <ng-container matColumnDef="Nombre">
                    <th mat-header-cell *matHeaderCellDef> Nombre </th>
                    <td mat-cell *matCellDef="let persona"> {{persona.nombres}} </td>
                </ng-container>

                <ng-container matColumnDef="Apellido">
                    <th mat-header-cell *matHeaderCellDef> Apellido </th>
                    <td mat-cell *matCellDef="let persona"> {{persona.apellidos}} </td>
                </ng-container>

                <ng-container matColumnDef="Celular">
                    <th mat-header-cell *matHeaderCellDef> Celular </th>
                    <td mat-cell *matCellDef="let persona"> {{persona.celular}} </td>
                </ng-container>

                <ng-container matColumnDef="Email">
                    <th mat-header-cell *matHeaderCellDef> Email </th>
                    <td mat-cell *matCellDef="let persona"> {{persona.email}} </td>
                </ng-container>
                <!-- Buttons Column -->
                <ng-container matColumnDef="btnVer">
                    <th mat-header-cell *matHeaderCellDef> Ver Info </th>
                    <td mat-cell *matCellDef="let persona">
                        <button mat-raised-button color="primary" matTooltip="Acceder" (click)="Acceder(persona)">Ver</button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="columnas"></tr>
                <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
            </table>
        </div>
        <mat-paginator [length]="totalPersonas" [pageSize]="20" hidePageSize="true" (page)="pageEvent($event)">
        </mat-paginator>
    </div>
</div>
