<div class="contenedor">
    <div style="min-width: 60%">
        <mat-card>
            <mat-card-header>
                <mat-card-title>Depósitos </mat-card-title>
            </mat-card-header>
            <mat-card-content>
                <div>
                    <div [class.loading]="loading">
                        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" #tabla1>

                            <ng-container matColumnDef="Id">
                                <th mat-header-cell *matHeaderCellDef> Id </th>
                                <td mat-cell *matCellDef="let item" [ngClass]="{'activa':item.saldo>0}"> {{item.id}}
                                </td>
                            </ng-container>

                            <ng-container matColumnDef="Fecha">
                                <th mat-header-cell *matHeaderCellDef> Fecha </th>
                                <td mat-cell *matCellDef="let item" [ngClass]="{'activa':item.saldo>0}">
                                    {{item.fecha.date|date:'dd-MM-yyyy'}} </td>
                            </ng-container>

                            <ng-container matColumnDef="Monto">
                                <th mat-header-cell *matHeaderCellDef> Monto</th>
                                <td mat-cell *matCellDef="let item" [ngClass]="{'activa':item.saldo>0}">{{item.monto}}
                                </td>
                            </ng-container>

                            <ng-container matColumnDef="Tipo">
                                <th mat-header-cell *matHeaderCellDef> Tipo</th>
                                <td mat-cell *matCellDef="let item" [ngClass]="{'activa':item.saldo>0}">{{item.tipo}}
                                </td>
                            </ng-container>

                            <ng-container matColumnDef="Rifas">
                                <th mat-header-cell *matHeaderCellDef> Rifas </th>
                                <td mat-cell *matCellDef="let item" [ngClass]="{'activa':item.saldo>0}">
                                    {{item.talones_total}} </td>
                            </ng-container>

                            <ng-container matColumnDef="P.Personal">
                                <th mat-header-cell *matHeaderCellDef> P.Personal </th>
                                <td mat-cell *matCellDef="let item" [ngClass]="{'activa':item.saldo>0}">
                                    {{item.pagoPersonal_total}} </td>
                            </ng-container>

                            <ng-container matColumnDef="Saldo">
                                <th mat-header-cell *matHeaderCellDef> Saldo </th>
                                <td mat-cell *matCellDef="let item" [ngClass]="{'activa':item.saldo>0}"> {{item.saldo}}
                                </td>
                            </ng-container>

                            <!-- Buttons Column -->
                            <ng-container matColumnDef="Actions">
                                <th mat-header-cell *matHeaderCellDef> </th>
                                <td mat-cell *matCellDef="let item" [ngClass]="{'activa':item.saldo>0}">
                                    <button mat-raised-button color="primary" [disabled]="item.seleccionado"
                                        matTooltip="Unir" *ngIf="item.saldo > 0" (click)="Unir(item)"
                                        value="activa">Unir</button>
                                </td>
                            </ng-container>

                            <tr mat-header-row *matHeaderRowDef="columnas"></tr>
                            <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
                        </table>
                    </div>
                    <mat-paginator [length]="totalDepositos" [pageIndex]="pageIndex" [pageSize]="pageSize"
                        hidePageSize="true" (page)="pageEvent($event)">
                    </mat-paginator>
                </div>
            </mat-card-content>
        </mat-card>
    </div>

    <div class="columna-izquierda">
        <app-depositos-chips (messageEvent)="receiveMessage($event)"></app-depositos-chips>
    </div>
</div>
